apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8snolatesttag
  annotations:
    description: "Interdit les images Docker avec le tag :latest en production"
spec:
  crd:
    spec:
      names:
        kind: K8sNoLatestTag
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8snolatesttag

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          endswith(c.image, ":latest")
          msg := sprintf("Image '%v' utilise :latest — tag explicite requis en prod", [c.image])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          not contains(c.image, ":")
          msg := sprintf("Image '%v' sans tag explicite (équivalent :latest)", [c.image])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.initContainers[_]
          endswith(c.image, ":latest")
          msg := sprintf("InitContainer image '%v' utilise :latest", [c.image])
        }
