apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: audit-log-forwarder
  namespace: security
spec:
  selector:
    matchLabels:
      app: audit-log-forwarder
  template:
    metadata:
      labels:
        app: audit-log-forwarder
    spec:
      containers:
        - name: promtail
          image: grafana/promtail:2.9.0
          args:
            - -config.file=/etc/promtail/config.yml
          volumeMounts:
            - name: audit-logs
              mountPath: /var/log/kubernetes
              readOnly: true
            - name: promtail-config
              mountPath: /etc/promtail
      volumes:
        - name: audit-logs
          hostPath:
            path: /var/log/kubernetes
        - name: promtail-config
          configMap:
            name: promtail-audit-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-audit-config
  namespace: security
data:
  config.yml: |
    server:
      http_listen_port: 9080

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-audit
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-audit
              namespace: security
              __path__: /var/log/kubernetes/audit.log
        pipeline_stages:
          - json:
              expressions:
                verb: verb
                user: user.username
                resource: objectRef.resource
                namespace: objectRef.namespace
                responseCode: responseStatus.code
          - labels:
              verb:
              user:
              resource:
              namespace: