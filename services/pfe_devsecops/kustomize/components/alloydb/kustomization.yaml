apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
# cartservice - replace REDIS_ADDR by ALLOYDB_PRIMARY_IP for the cartservice Deployment
# Potentially later we'll factor in splitting traffic to primary/read pool, but for now
# we'll just manage the primary instance
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cartservice
    spec:
      template:
        spec:
          containers:
            - name: server
              env:
              - name: REDIS_ADDR
                $patch: delete
              - name: ALLOYDB_PRIMARY_IP
                value: ALLOYDB_PRIMARY_IP_VAL
              - name: ALLOYDB_DATABASE_NAME
                value: ALLOYDB_CARTS_DATABASE_NAME_VAL
              - name: ALLOYDB_TABLE_NAME
                value: ALLOYDB_CARTS_TABLE_NAME_VAL
              - name: ALLOYDB_SECRET_NAME
                value: ALLOYDB_SECRET_NAME_VAL
              - name: PROJECT_ID
                value: PROJECT_ID_VAL
# cartservice - add the GSA annotation for the cartservice KSA
- patch: |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: cartservice
      annotations:
        iam.gke.io/gcp-service-account: ALLOYDB_USER_GSA_ID
# productcatalogservice - replace ALLOYDB environments
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: productcatalogservice
    spec:
      template:
        spec:
          containers:
            - name: server
              env:
              - name: ALLOYDB_CLUSTER_NAME
                value: ALLOYDB_CLUSTER_NAME_VAL
              - name: ALLOYDB_INSTANCE_NAME
                value: ALLOYDB_INSTANCE_NAME_VAL
              - name: ALLOYDB_DATABASE_NAME
                value: ALLOYDB_PRODUCTS_DATABASE_NAME_VAL
              - name: ALLOYDB_TABLE_NAME
                value: ALLOYDB_PRODUCTS_TABLE_NAME_VAL
              - name: ALLOYDB_SECRET_NAME
                value: ALLOYDB_SECRET_NAME_VAL
              - name: PROJECT_ID
                value: PROJECT_ID_VAL
              - name: REGION
                value: REGION_VAL
# productcatalogservice - add the GSA annotation for the productcatalogservice KSA
- patch: |-
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: productcatalogservice
      annotations:
        iam.gke.io/gcp-service-account: ALLOYDB_USER_GSA_ID
# redis - remove the redis-cart Deployment
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: redis-cart
    $patch: delete
# redis - remove the redis-cart Service
- patch: |-
    apiVersion: v1
    kind: Service
    metadata:
      name: redis-cart
    $patch: delete
metadata:
  annotations:
    checkov.io/skip100: CKV_K8S_22=Might break file writes
    checkov.io/skip101: CKV_K8S_28=Capabilities needed
    checkov.io/skip102: CKV_K8S_37=Default seccomp is fine
    checkov.io/skip103: CKV_K8S_43=Using latest tags for development
    checkov.io/skip104: CKV_K8S_8=No liveness probe available
    checkov.io/skip105: CKV_K8S_9=No readiness probe available
    checkov.io/skip106: CKV_K8S_10=No CPU requests
    checkov.io/skip107: CKV_K8S_11=No CPU limits
    checkov.io/skip108: CKV_K8S_12=No Memory requests
    checkov.io/skip109: CKV_K8S_13=No Memory limits
    checkov.io/skip110: CKV_K8S_14=No CPU limit
    checkov.io/skip111: CKV_K8S_15=No Memory limit
    checkov.io/skip200: CKV_K8S_21=Default namespace is used by design in this 
      architecture
    checkov.io/skip201: CKV_K8S_31=Seccomp profile might break legacy apps
    checkov.io/skip202: CKV_K8S_40=UID 1000 is used instead of 10000 to preserve
      file permissions
    checkov.io/skip203: CKV_K8S_23=Some containers require root
    checkov.io/skip204: CKV_K8S_29=Security context not required for patches
    checkov.io/skip205: CKV_K8S_38=Service account tokens are managed explicitly
