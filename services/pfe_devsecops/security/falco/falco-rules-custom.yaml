apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: security
  labels:
    app: falco
    purpose: runtime-threat-detection
data:
  custom-rules.yaml: |

    # ─── RÈGLE 1 : Shell dans container microservice ───────────────────────
    - rule: Shell Spawned in Microservice Container
      desc: >
        Détecte l'ouverture d'un shell interactif dans les containers
        des namespaces dev ou prod — vecteur d'attaque post-exploitation
      condition: >
        spawned_process and
        container and
        k8s.ns.name in (dev, prod) and
        proc.name in (bash, sh, zsh, ash, fish, ksh) and
        not proc.pname in (run.sh, entrypoint.sh, docker-entrypoint.sh, start.sh)
      output: >
        CRITICAL: Shell ouvert dans microservice
        (user=%user.name cmd=%proc.cmdline container=%container.name
        image=%container.image.repository ns=%k8s.ns.name pod=%k8s.pod.name
        uid=%user.uid loginuid=%user.loginuid)
      priority: CRITICAL
      tags: [container, shell, mitre_execution, T1059]

    # ─── RÈGLE 2 : Lecture de fichiers secrets ─────────────────────────────
    - rule: Sensitive File Read in Container
      desc: >
        Détecte la lecture de fichiers système sensibles depuis un container
      condition: >
        open_read and
        container and
        k8s.ns.name in (dev, prod) and
        fd.name in (
          /etc/passwd, /etc/shadow, /etc/sudoers,
          /etc/kubernetes/admin.conf,
          /var/run/secrets/kubernetes.io/serviceaccount/token,
          /proc/1/environ
        )
      output: >
        WARNING: Fichier sensible accédé
        (file=%fd.name user=%user.name container=%container.name
        pod=%k8s.pod.name ns=%k8s.ns.name image=%container.image.repository)
      priority: WARNING
      tags: [container, filesystem, mitre_credential_access, T1552]

    # ─── RÈGLE 3 : Écriture dans /etc depuis container ─────────────────────
    - rule: Write to /etc in Container
      desc: >
        Modification du répertoire /etc dans un container — potentielle
        persistance ou escalade de privilège
      condition: >
        open_write and
        container and
        k8s.ns.name in (dev, prod) and
        fd.name startswith /etc
      output: >
        ERROR: Écriture dans /etc depuis container
        (file=%fd.name user=%user.name container=%container.name
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: ERROR
      tags: [container, filesystem, mitre_persistence, T1053]

    # ─── RÈGLE 4 : Exécution de binaire réseau suspect ─────────────────────
    - rule: Network Tool Executed in Container
      desc: >
        Détecte l'exécution d'outils réseau (nmap, curl, wget, nc)
        dans les containers — reconnaissance ou exfiltration
      condition: >
        spawned_process and
        container and
        k8s.ns.name in (dev, prod) and
        proc.name in (nmap, nc, netcat, socat, curl, wget, masscan)
      output: >
        ERROR: Outil réseau exécuté dans container
        (tool=%proc.name cmd=%proc.cmdline container=%container.name
        pod=%k8s.pod.name ns=%k8s.ns.name user=%user.name)
      priority: ERROR
      tags: [container, network, mitre_discovery, mitre_exfiltration, T1046]

    # ─── RÈGLE 5 : Privilege escalation via sudo/su ────────────────────────
    - rule: Privilege Escalation Attempt
      desc: >
        Tentative d'escalade de privilège via sudo ou su dans un container
      condition: >
        spawned_process and
        container and
        proc.name in (sudo, su, newgrp) and
        k8s.ns.name in (dev, prod)
      output: >
        CRITICAL: Tentative escalade de privilège
        (user=%user.name cmd=%proc.cmdline container=%container.name
        pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [container, privilege_escalation, mitre_privilege_escalation, T1548]
