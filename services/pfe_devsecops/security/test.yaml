apiVersion: v1
kind: Pod
metadata:
  name: test-root
  annotations:
    checkov.io/skip1: CKV_K8S_23=Intentional root container for OPA testing
    checkov.io/skip2: CKV_K8S_11=No resources needed for test
    checkov.io/skip3: CKV_K8S_21=Default namespace used for test
    checkov.io/skip4: CKV_K8S_37=Capabilities needed for test
    checkov.io/skip5: CKV_K8S_10=No CPU requests
    checkov.io/skip6: CKV_K8S_12=No Memory requests
    checkov.io/skip7: CKV_K8S_13=No Memory limits
    checkov.io/skip8: CKV_K8S_14=No CPU limit
    checkov.io/skip9: CKV_K8S_15=No Memory limit
    checkov.io/skip10: CKV_K8S_8=No liveness probe
    checkov.io/skip11: CKV_K8S_9=No readiness probe
    checkov.io/skip12: CKV_K8S_20=No drop ALL
    checkov.io/skip13: CKV_K8S_22=No read only fs
    checkov.io/skip14: CKV_K8S_28=No drop capabilities
    checkov.io/skip15: CKV_K8S_29=No security context
    checkov.io/skip16: CKV_K8S_31=No seccomp
