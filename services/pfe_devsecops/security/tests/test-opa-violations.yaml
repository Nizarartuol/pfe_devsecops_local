# TEST 1 : Pod root — doit être BLOQUÉ par K8sNoRoot
apiVersion: v1
kind: Pod
metadata:
  name: test-root-violation
  namespace: dev
  labels:
    app: test
    version: "1.0"
    team: security-test
spec:
  containers:
    - name: test-root
      image: nginx:1.25
      securityContext:
        runAsUser: 0
---
# TEST 2 : Pod latest tag — doit être BLOQUÉ en prod par K8sNoLatestTag
apiVersion: v1
kind: Pod
metadata:
  name: test-latest-violation
  namespace: prod
  labels:
    app: test
    version: "1.0"
    team: security-test
spec:
  containers:
    - name: test-latest
      image: nginx:latest
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"
---
# TEST 3 : Pod sans resource limits — doit être BLOQUÉ par K8sRequireLimits
apiVersion: v1
kind: Pod
metadata:
  name: test-nolimits-violation
  namespace: dev
  labels:
    app: test
    version: "1.0"
    team: security-test
spec:
  containers:
    - name: test-nolimits
      image: nginx:1.25
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
# TEST 4 : Pod privileged — doit être BLOQUÉ par K8sNoPrivileged
apiVersion: v1
kind: Pod
metadata:
  name: test-privileged-violation
  namespace: dev
  labels:
    app: test
    version: "1.0"
    team: security-test
spec:
  containers:
    - name: test-privileged
      image: nginx:1.25
      securityContext:
        privileged: true
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"
