apiVersion: audit.k8s.io/v1
kind: Policy
omitStages:
  - RequestReceived
rules:
  # Niveau RequestResponse — enregistrer requête ET réponse complète
  
  # Accès aux secrets — critique
  - level: RequestResponse
    resources:
      - group: ""
        resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    namespaces: ["dev", "prod"]

  # Modifications RBAC — critique
  - level: RequestResponse
    resources:
      - group: "rbac.authorization.k8s.io"
        resources:
          - "roles"
          - "rolebindings"
          - "clusterroles"
          - "clusterrolebindings"

  # Création/suppression pods dans namespaces applicatifs
  - level: RequestResponse
    resources:
      - group: ""
        resources: ["pods"]
    verbs: ["create", "delete", "deletecollection"]
    namespaces: ["dev", "prod"]

  # Modifications ConfigMaps
  - level: Metadata
    resources:
      - group: ""
        resources: ["configmaps"]
    namespaces: ["dev", "prod"]

  # Toutes les actions sur les namespaces de sécurité
  - level: RequestResponse
    namespaces: ["security", "gatekeeper-system"]

  # Ignorer les requêtes système trop verbeuses
  - level: None
    users:
      - system:kube-proxy
      - system:node
    verbs: ["watch", "list"]

  - level: None
    resources:
      - group: ""
        resources: ["endpoints", "services", "services/status"]
    users:
      - system:kube-proxy

  # Tout le reste en Metadata
  - level: Metadata
    omitStages:
      - RequestReceived