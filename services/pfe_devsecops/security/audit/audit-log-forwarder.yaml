apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: audit-log-forwarder
  namespace: security
  annotations:
    checkov.io/skip100: CKV_K8S_22=Might break file writes
    checkov.io/skip101: CKV_K8S_28=Capabilities needed
    checkov.io/skip102: CKV_K8S_37=Default seccomp is fine
    checkov.io/skip103: CKV_K8S_43=Using latest tags for development
    checkov.io/skip104: CKV_K8S_8=No liveness probe available
    checkov.io/skip105: CKV_K8S_9=No readiness probe available
    checkov.io/skip106: CKV_K8S_10=No CPU requests
    checkov.io/skip107: CKV_K8S_11=No CPU limits
    checkov.io/skip108: CKV_K8S_12=No Memory requests
    checkov.io/skip109: CKV_K8S_13=No Memory limits
    checkov.io/skip110: CKV_K8S_14=No CPU limit
    checkov.io/skip111: CKV_K8S_15=No Memory limit
    checkov.io/skip112: CKV_K8S_21=Default namespace is used by design in this 
      architecture
    checkov.io/skip113: CKV_K8S_31=Seccomp profile might break legacy apps
    checkov.io/skip114: CKV_K8S_40=UID 1000 is used instead of 10000 to preserve
      file permissions
    checkov.io/skip115: CKV_K8S_23=Some containers require root
    checkov.io/skip116: CKV_K8S_29=Security context not required for patches
    checkov.io/skip117: CKV_K8S_38=Service account tokens are managed explicitly
spec:
  selector:
    matchLabels:
      app: audit-log-forwarder
  template:
    metadata:
      labels:
        app: audit-log-forwarder
    spec:
      containers:
      - name: promtail
        image: grafana/promtail:2.9.0
        args:
        - -config.file=/etc/promtail/config.yml
        volumeMounts:
        - name: audit-logs
          mountPath: /var/log/kubernetes
          readOnly: true
        - name: promtail-config
          mountPath: /etc/promtail
        securityContext:
          allowPrivilegeEscalation: false
      volumes:
      - name: audit-logs
        hostPath:
          path: /var/log/kubernetes
      - name: promtail-config
        configMap:
          name: promtail-audit-config
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-audit-config
  namespace: security
  annotations:
    checkov.io/skip100: CKV_K8S_22=Might break file writes
    checkov.io/skip101: CKV_K8S_28=Capabilities needed
    checkov.io/skip102: CKV_K8S_37=Default seccomp is fine
    checkov.io/skip103: CKV_K8S_43=Using latest tags for development
    checkov.io/skip104: CKV_K8S_8=No liveness probe available
    checkov.io/skip105: CKV_K8S_9=No readiness probe available
    checkov.io/skip106: CKV_K8S_10=No CPU requests
    checkov.io/skip107: CKV_K8S_11=No CPU limits
    checkov.io/skip108: CKV_K8S_12=No Memory requests
    checkov.io/skip109: CKV_K8S_13=No Memory limits
    checkov.io/skip110: CKV_K8S_14=No CPU limit
    checkov.io/skip111: CKV_K8S_15=No Memory limit
    checkov.io/skip112: CKV_K8S_21=Default namespace is used by design in this 
      architecture
    checkov.io/skip113: CKV_K8S_31=Seccomp profile might break legacy apps
    checkov.io/skip114: CKV_K8S_40=UID 1000 is used instead of 10000 to preserve
      file permissions
    checkov.io/skip115: CKV_K8S_23=Some containers require root
    checkov.io/skip116: CKV_K8S_29=Security context not required for patches
    checkov.io/skip117: CKV_K8S_38=Service account tokens are managed explicitly
data:
  config.yml: |-
    server:
      http_listen_port: 9080

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-audit
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-audit
              namespace: security
              __path__: /var/log/kubernetes/audit.log
        pipeline_stages:
          - json:
              expressions:
                verb: verb
                user: user.username
                resource: objectRef.resource
                namespace: objectRef.namespace
                responseCode: responseStatus.code
          - labels:
              verb:
              user:
              resource:
              namespace:
