# Zero-trust : bloquer tout le trafic par défaut sur dev
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: dev
  annotations:
    description: "Politique zero-trust — tout trafic bloqué par défaut"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Autoriser le trafic intra-namespace dev
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: dev
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
    # DNS toujours autorisé
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Autoriser monitoring à scraper les métriques
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: dev
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: 8080
          protocol: TCP
        - port: 9090
          protocol: TCP
