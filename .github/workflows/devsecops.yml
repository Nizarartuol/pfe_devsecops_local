name: Secure DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:

env:
  REGISTRY: registry.localhost:5000
  IMAGE_TAG: ${{ github.sha }}
  # All microservices to build/scan
  SERVICES: "frontend adservice cartservice checkoutservice currencyservice emailservice paymentservice productcatalogservice recommendationservice shippingservice loadgenerator"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Secret guard – fail fast if required secrets are missing
  # ─────────────────────────────────────────────────────────────────────────────
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets are set
        run: |
          MISSING=()
          [[ -z "${{ secrets.SONAR_TOKEN }}"  ]] && MISSING+=("SONAR_TOKEN")
          [[ -z "${{ secrets.GITHUB_TOKEN }}" ]] && MISSING+=("GITHUB_TOKEN")
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "❌ Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required secrets are present."

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Security – Gitleaks + Trivy FS + Trivy image scan (frontend only, fast)
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4

      # Secret leaks
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          fail: true

  # Filesystem vulnerability scan
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v1
        with:
          version: 0.69.3

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.10.1
        with:
          scan-type: fs
          scan-ref: ./services/pfe_devsecops/src
          severity: CRITICAL,HIGH
          exit-code: 1

  # Build frontend image to scan it
      - name: Build frontend Docker image (for security scan)
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/frontend:${{ env.IMAGE_TAG }} \
            ./services/pfe_devsecops/src/frontend

      - name: Run Trivy Image Scan (frontend)
        uses: aquasecurity/trivy-action@v0.10.1
        with:
          image-ref: ${{ env.REGISTRY }}/frontend:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. SonarQube – SonarCloud (always) + self-hosted (if SONAR_HOST_URL is set)
  # ─────────────────────────────────────────────────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    needs: check-secrets
    # Expose secret as an env var so we can check it in step `if:` conditions
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── SonarCloud (always runs) ───────────────────────────────────────────
      - name: Vérifier le contenu du repo
        run: ls -R .
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.0.0
        with:
          projectBaseDir: .   # <- assure-toi que ce chemin existe après checkout
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Self-hosted SonarQube (only when SONAR_HOST_URL secret is set) ────
#      - name: Self-hosted SonarQube Scan
#        if: ${{ env.SONAR_HOST_URL != '' }}
#        uses: SonarSource/sonarqube-scan-action@v5
#        with:
#          projectBaseDir: ./services/pfe_devsecops
#        env:
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
#
  # ─────────────────────────────────────────────────────────────────────────────
  # 3. OWASP ZAP Baseline Scan – runs against the locally started frontend
  # ─────────────────────────────────────────────────────────────────────────────
  zap:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Build and start frontend
        run: |
          docker build \
            -t app-test \
            ./services/pfe_devsecops/src/frontend
          docker run -d -p 8080:8080 --name frontend-zap app-test
          echo "Waiting for frontend to be ready…"
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/_healthz > /dev/null 2>&1; then
              echo "Frontend is up."
              break
            fi
            echo "Attempt $i/12 – not ready yet, sleeping 5s…"
            sleep 5
          done

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_md.md

      - name: Stop frontend container
        if: always()
        run: docker stop frontend-zap || true

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Build & Push – loop over all 11 services → registry.localhost:5000
  # ─────────────────────────────────────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: [security, sonar, zap]
    steps:
      - uses: actions/checkout@v4

      - name: Build, push, and Trivy-scan all services
        run: |
          SRC_BASE="./services/pfe_devsecops/src"
          REGISTRY="${{ env.REGISTRY }}"
          TAG="${{ env.IMAGE_TAG }}"
          SERVICES="${{ env.SERVICES }}"

          for svc in $SERVICES; do
            echo "══════════════════════════════════════"
            echo "▶ Building  $REGISTRY/$svc:$TAG"
            echo "══════════════════════════════════════"
            docker build -t "$REGISTRY/$svc:$TAG" "$SRC_BASE/$svc"

            echo "▶ Pushing   $REGISTRY/$svc:$TAG  (with retry)"
            for attempt in 1 2 3; do
              if docker push "$REGISTRY/$svc:$TAG"; then
                echo "✅ Push succeeded on attempt $attempt."
                break
              fi
              echo "⚠️  Push failed (attempt $attempt/3). Retrying in 10s…"
              sleep 10
              if [ $attempt -eq 3 ]; then
                echo "❌ Push failed after 3 attempts for $svc. Aborting."
                exit 1
              fi
            done

            echo "▶ Trivy image scan: $REGISTRY/$svc:$TAG"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image \
              --severity CRITICAL,HIGH \
              --exit-code 1 \
              "$REGISTRY/$svc:$TAG" || {
                echo "❌ Trivy found CRITICAL/HIGH vulnerabilities in $svc"
                exit 1
              }

            echo "✅ $svc done."
          done

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. GitOps Update – update image tags in gitops-repo and push
  # ─────────────────────────────────────────────────────────────────────────────
  gitops-update:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: gitops-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in Kubernetes manifests
        run: |
          MANIFESTS_DIR="gitops-repo/kubernetes-manifests"
          REGISTRY="${{ env.REGISTRY }}"
          TAG="${{ env.IMAGE_TAG }}"
          SERVICES="${{ env.SERVICES }}"

          for svc in $SERVICES; do
            FILE="$MANIFESTS_DIR/${svc}.yaml"
            if [ -f "$FILE" ]; then
              sed -i "s|image: $REGISTRY/$svc:.*|image: $REGISTRY/$svc:$TAG|g" "$FILE"
              echo "✅ Updated $FILE"
            else
              echo "⚠️  $FILE not found – skipping"
            fi
          done

      - name: Commit and push manifest changes
        run: |
          cd gitops-repo
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add kubernetes-manifests/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: update image tags to ${{ env.IMAGE_TAG }} [skip ci]"
            git push
          fi

