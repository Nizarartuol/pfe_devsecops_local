name: Secure DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:

env:
  REGISTRY: ghcr.io/nizarartuol
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Secret guard – fail fast if required secrets are missing
  # ─────────────────────────────────────────────────────────────────────────────
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets are set
        run: |
          MISSING=()
          [[ -z "${{ secrets.SONAR_TOKEN }}"  ]] && MISSING+=("SONAR_TOKEN")
          [[ -z "${{ secrets.GITHUB_TOKEN }}" ]] && MISSING+=("GITHUB_TOKEN")
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "❌ Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required secrets are present."

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Security – Gitleaks + Trivy FS + Checkov + Semgrep (parallel capable)
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4

      # Secret leaks — blocks if leaks found
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cache Trivy vulnerability DB to speed up repeated runs
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-

      # Regenerate go.sum files for Go services
      - name: Update Go module checksums
        run: |
          for svc in checkoutservice productcatalogservice shippingservice frontend; do
            if [ -f "./services/pfe_devsecops/src/$svc/go.mod" ]; then
              echo "Running go mod tidy for $svc..."
              (cd ./services/pfe_devsecops/src/$svc && go mod tidy)
            fi
          done

      # Trivy filesystem scan — CRITICAL/HIGH blocks pipeline
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./services/pfe_devsecops/src
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table
          cache-dir: ~/.cache/trivy

      # IaC Security: Checkov — Kubernetes manifests + Dockerfiles
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./services/pfe_devsecops
          framework: kubernetes,dockerfile
          quiet: true
          soft_fail: false

      # SAST: Semgrep — only on PRs (where it adds most value for code review)
      - name: Semgrep Scan
        if: github.event_name == 'pull_request'
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"

      - name: Verify dependency lock files
        run: |
          echo "Vérification des fichiers de lock..."
          for svc in checkoutservice productcatalogservice shippingservice frontend; do
            if [ -f "./src/$svc/go.mod" ] && [ ! -f "./src/$svc/go.sum" ]; then
              echo "❌ go.sum manquant pour $svc"
              exit 1
            fi
            echo "✅ $svc lock file OK"
          done

      - name: Check for unpinned base images
        run: |
          if grep -r "FROM.*:latest" ./src/*/Dockerfile 2>/dev/null; then
            echo "❌ Images avec tag :latest détectées dans les Dockerfiles"
            exit 1
          else
            echo "✅ Toutes les images de base sont pinnées"
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. SonarCloud — runs in parallel with security (only on main branch)
  # ─────────────────────────────────────────────────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    needs: check-secrets
    if: github.ref == 'refs/heads/main'
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.0.0
        with:
          projectBaseDir: services/pfe_devsecops
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. OWASP ZAP Baseline Scan — only on push to main
  # ─────────────────────────────────────────────────────────────────────────────
  zap:
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend for ZAP scan
        uses: docker/build-push-action@v5
        with:
          context: ./services/pfe_devsecops/src/frontend
          push: false
          load: true
          tags: app-test:latest
          cache-from: type=gha,scope=zap-frontend
          cache-to: type=gha,scope=zap-frontend,mode=max

      - name: Start frontend and wait for readiness
        run: |
          docker run -d -p 8080:8080 --name frontend-zap app-test:latest
          echo "Waiting for frontend to be ready…"
          for i in $(seq 1 6); do
            if curl -sf http://localhost:8080/_healthz > /dev/null 2>&1; then
              echo "Frontend is up."
              break
            fi
            echo "Attempt $i/6 – not ready yet, sleeping 5s…"
            sleep 5
          done

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-J zap-report.json'

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_md.md

      - name: Stop frontend container
        if: always()
        run: docker stop frontend-zap || true

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Build & Push — matrix strategy: all 11 services in parallel
  # Each job instance: build one service, push, scan with Trivy image scan
  # Depends ONLY on security (runs in parallel with sonar and zap)
  # ─────────────────────────────────────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: security
    strategy:
      fail-fast: true
      matrix:
        service:
          - frontend
          - adservice
          - cartservice
          - checkoutservice
          - currencyservice
          - emailservice
          - paymentservice
          - productcatalogservice
          - recommendationservice
          - shippingservice
          - loadgenerator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Determine build context
        id: ctx
        run: |
          if [ "${{ matrix.service }}" = "cartservice" ]; then
            echo "path=./services/pfe_devsecops/src/${{ matrix.service }}/src" >> $GITHUB_OUTPUT
          else
            echo "path=./services/pfe_devsecops/src/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-

      - name: Trivy image scan — ${{ matrix.service }}
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table
          cache-dir: ~/.cache/trivy

      - name: Sign all images with Cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          REGISTRY="${{ env.REGISTRY }}"
          TAG="${{ env.IMAGE_TAG }}"
          SERVICES="${{ env.SERVICES }}"

          for svc in $SERVICES; do
            IMAGE="$REGISTRY/$svc:$TAG"
            echo "🔏 Signing $IMAGE"
            cosign sign --yes "$IMAGE"
            echo "✅ $svc signed successfully"
          done

      - name: Generate and sign SBOM for all services
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          REGISTRY="${{ env.REGISTRY }}"
          TAG="${{ env.IMAGE_TAG }}"
          SERVICES="${{ env.SERVICES }}"

          for svc in $SERVICES; do
            IMAGE="$REGISTRY/$svc:$TAG"
            echo "📋 Generating SBOM for $svc"
            syft "$IMAGE" -o spdx-json > sbom-$svc.json

            echo "🔏 Signing SBOM for $svc"
            cosign attest --yes \
              --predicate sbom-$svc.json \
              --type spdxjson \
              "$IMAGE"

            echo "✅ SBOM generated and signed for $svc"
          done

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: sbom-*.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. GitOps Update — update image tags in gitops-repo manifests
  # Waits for ALL matrix build-push jobs to succeed
  # ─────────────────────────────────────────────────────────────────────────────
  gitops-update:
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: Nizarartuol/pfe-devsecops-gitops
          path: gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify all image signatures
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          REGISTRY="${{ env.REGISTRY }}"
          TAG="${{ env.IMAGE_TAG }}"
          SERVICES="${{ env.SERVICES }}"

          for svc in $SERVICES; do
            IMAGE="$REGISTRY/$svc:$TAG"
            echo "🔍 Verifying signature for $IMAGE"
            cosign verify "$IMAGE" \
              --certificate-identity-regexp="https://github.com/Nizarartuol/.*" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
            echo "✅ $svc signature verified"
          done

      - name: Update image tags in Kubernetes manifests
        run: |
          MANIFESTS_DIR="gitops-repo/apps"
          REGISTRY="${{ env.REGISTRY }}"
          TAG="${{ env.IMAGE_TAG }}"
          SERVICES="frontend adservice cartservice checkoutservice currencyservice emailservice paymentservice productcatalogservice recommendationservice shippingservice loadgenerator"

          for svc in $SERVICES; do
            FILE="$MANIFESTS_DIR/$svc/deployment.yaml"
            if [ -f "$FILE" ]; then
              sed -i "s|image:.*$svc:.*|image: $REGISTRY/$svc:$TAG|g" "$FILE"
              echo "✅ Updated $FILE"
            else
              echo "⚠️  $FILE not found – skipping"
            fi
          done

      - name: Commit and push manifest changes
        run: |
          cd gitops-repo
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add apps/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: update image tags to ${{ env.IMAGE_TAG }} [skip ci]"
            git push
          fi
