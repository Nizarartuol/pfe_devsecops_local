name: Secure DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:

env:
  REGISTRY: ghcr.io/nizarartuol
  IMAGE_TAG: ${{ github.sha }}
  # All microservices to build/scan
  SERVICES: "frontend adservice cartservice checkoutservice currencyservice emailservice paymentservice productcatalogservice recommendationservice shippingservice loadgenerator"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 0. Secret guard – fail fast if required secrets are missing
  # ─────────────────────────────────────────────────────────────────────────────
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required secrets are set
        run: |
          MISSING=()
          [[ -z "${{ secrets.SONAR_TOKEN }}"  ]] && MISSING+=("SONAR_TOKEN")
          [[ -z "${{ secrets.GITHUB_TOKEN }}" ]] && MISSING+=("GITHUB_TOKEN")
          if [ ${#MISSING[@]} -ne 0 ]; then
            echo "❌ Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required secrets are present."

# ─────────────────────────────────────────────────────────────────────────────
# 1. Security – Gitleaks + Trivy FS + Trivy image scan (frontend only, fast)
# ─────────────────────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4

    # Secret leaks
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

    # Regenerate go.sum files to match updated go.mod dependency versions
      - name: Update Go module checksums
        run: |
          for svc in checkoutservice productcatalogservice shippingservice frontend; do
            if [ -f "./services/pfe_devsecops/src/$svc/go.mod" ]; then
              echo "Running go mod tidy for $svc..."
              (cd ./services/pfe_devsecops/src/$svc && go mod tidy)
            fi
          done

    # Trivy filesystem scan – blocks the pipeline on CRITICAL/HIGH findings.
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./services/pfe_devsecops/src
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

    # IaC Security: Checkov – Kubernetes manifests + Dockerfiles
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./services/pfe_devsecops
          framework: kubernetes,dockerfile
          quiet: true
          soft_fail: false

    # SAST: Semgrep Scan
      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
        continue-on-error: true


  # ─────────────────────────────────────────────────────────────────────────────
  # 2. SonarQube – SonarCloud (always) + self-hosted 
  # ─────────────────────────────────────────────────────────────────────────────
  sonar:
    runs-on: ubuntu-latest
    needs: check-secrets
    # Expose secret as an env var so we can check it in step `if:` conditions
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── SonarCloud (always runs) ───────────────────────────────────────────
      - name: Vérifier le contenu du repo
        run: ls -R .
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.0.0
        with:
          projectBaseDir: services/pfe_devsecops   # <- assure-toi que ce chemin existe après checkout
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Self-hosted SonarQube (only when SONAR_HOST_URL secret is set) ────
#      - name: Self-hosted SonarQube Scan
#        if: ${{ env.SONAR_HOST_URL != '' }}
#        uses: SonarSource/sonarqube-scan-action@v5
#        with:
#          projectBaseDir: ./services/pfe_devsecops
#        env:
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
#
  # ─────────────────────────────────────────────────────────────────────────────
  # 3. OWASP ZAP Baseline Scan – runs against the locally started frontend
  # ─────────────────────────────────────────────────────────────────────────────
  zap:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Build and start frontend
        run: |
          docker build \
            -t app-test \
            ./services/pfe_devsecops/src/frontend
          docker run -d -p 8080:8080 --name frontend-zap app-test
          echo "Waiting for frontend to be ready…"
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/_healthz > /dev/null 2>&1; then
              echo "Frontend is up."
              break
            fi
            echo "Attempt $i/12 – not ready yet, sleeping 5s…"
            sleep 5
          done

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-J zap-report.json'

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_md.md

      # [DEFECTDOJO - disabled] Uncomment when DEFECTDOJO_URL + DEFECTDOJO_TOKEN secrets are set
      # - name: Upload ZAP Report to DefectDojo
      #   if: always()
      #   run: |
      #     curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
      #       -H "Authorization: Token ${{ secrets.DEFECTDOJO_TOKEN }}" \
      #       -F "file=@zap-report.json" \
      #       -F "scan_type=ZAP Scan" \
      #       -F "engagement_name=GitHub Actions" \
      #       -F "verified=true" \
      #       -F "active=true"

      - name: Stop frontend container
        if: always()
        run: docker stop frontend-zap || true

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Build & Push – loop over all 11 services → registry.localhost:5000
  # ─────────────────────────────────────────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: [security, sonar, zap]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build, push, and Trivy-scan all services
        run: |
          SRC_BASE="./services/pfe_devsecops/src"
          REGISTRY="${{ env.REGISTRY }}"
          TAG="${{ env.IMAGE_TAG }}"
          SERVICES="${{ env.SERVICES }}"

          for svc in $SERVICES; do
            echo "══════════════════════════════════════"
            echo "▶ Building  $REGISTRY/$svc:$TAG"
            echo "══════════════════════════════════════"
            if [ "$svc" = "cartservice" ]; then
              BUILD_CTX="$SRC_BASE/$svc/src"
            else
              BUILD_CTX="$SRC_BASE/$svc"
            fi
            docker build -t "$REGISTRY/$svc:$TAG" "$BUILD_CTX"

            echo "▶ Pushing   $REGISTRY/$svc:$TAG  (with retry)"
            for attempt in 1 2 3; do
              if docker push "$REGISTRY/$svc:$TAG"; then
                echo "✅ Push succeeded on attempt $attempt."
                break
              fi
              echo "⚠️  Push failed (attempt $attempt/3). Retrying in 10s…"
              sleep 10
              if [ $attempt -eq 3 ]; then
                echo "❌ Push failed after 3 attempts for $svc. Aborting."
                exit 1
              fi
            done

            echo "▶ Trivy image scan: $REGISTRY/$svc:$TAG"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:0.48.0 image \
              --severity CRITICAL,HIGH \
              --exit-code 1 \
              --ignore-unfixed \
              "$REGISTRY/$svc:$TAG"

            # [DEFECTDOJO - disabled] Uncomment when DEFECTDOJO_URL + DEFECTDOJO_TOKEN secrets are set
            # echo "▶ Uploading Trivy report for $svc to DefectDojo"
            # docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            #   aquasec/trivy:0.48.0 image --severity CRITICAL,HIGH --ignore-unfixed \
            #   --format json -o trivy-report.json "$REGISTRY/$svc:$TAG"
            # curl -X POST "${{ secrets.DEFECTDOJO_URL }}/api/v2/import-scan/" \
            #   -H "Authorization: Token ${{ secrets.DEFECTDOJO_TOKEN }}" \
            #   -F "file=@trivy-report.json" \
            #   -F "scan_type=Trivy Scan" \
            #   -F "engagement_name=GitHub Actions" \
            #   -F "verified=true" \
            #   -F "active=true" || echo "⚠️  DefectDojo upload failed for $svc (non-blocking)"

            echo "✅ $svc done."
          done

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. GitOps Update – update image tags in gitops-repo and push
  # ─────────────────────────────────────────────────────────────────────────────
  gitops-update:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: Nizarartuol/pfe-devsecops-gitops
          path: gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update image tags in Kubernetes manifests
        run: |
          MANIFESTS_DIR="gitops-repo/apps"
          REGISTRY="${{ env.REGISTRY }}"
          TAG="${{ env.IMAGE_TAG }}"
          SERVICES="${{ env.SERVICES }}"

          for svc in $SERVICES; do
            FILE="$MANIFESTS_DIR/$svc/deployment.yaml"
            if [ -f "$FILE" ]; then
              sed -i "s|image:.*$svc:.*|image: $REGISTRY/$svc:$TAG|g" "$FILE"
              echo "✅ Updated $FILE"
            else
              echo "⚠️  $FILE not found – skipping"
            fi
          done

      - name: Commit and push manifest changes
        run: |
          cd gitops-repo
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add apps/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: update image tags to ${{ env.IMAGE_TAG }} [skip ci]"
            git push
          fi

